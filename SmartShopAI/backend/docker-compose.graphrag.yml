services:
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: smartshop-milvus-etcd
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - smartshop-milvus-etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: smartshop-milvus-minio
    command: minio server /minio_data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - smartshop-milvus-minio:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: smartshop-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - smartshop-milvus-data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy

  neo4j:
    image: neo4j:5.26-community
    container_name: smartshop-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-SmartShopAI123}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - smartshop-neo4j-data:/data
      - smartshop-neo4j-logs:/logs

volumes:
  smartshop-milvus-etcd:
  smartshop-milvus-minio:
  smartshop-milvus-data:
  smartshop-neo4j-data:
  smartshop-neo4j-logs:
